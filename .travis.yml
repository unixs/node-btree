language: node_js

jobs:
  include:
    - os: linux
      dist: trusty
    - os: osx
      osx_image: xcode7.2
    - os: windows

node_js:
  - 10

cache:
  directories:
  - "$HOME/.npm"

before_install:
- |-
    case $TRAVIS_OS_NAME in
      windows)
        choco install -y gtk-runtime
        ;;
    esac
